name: Documentation Freshness Check

on:
  # Scheduled runs - weekly on Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Manual trigger
  workflow_dispatch:
    inputs:
      skip_url_check:
        description: 'Skip external URL validation'
        required: false
        default: 'false'
        type: boolean
      verbose:
        description: 'Enable verbose output'
        required: false
        default: 'false'
        type: boolean

  # Run on PRs that modify documentation
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
      - '.doc-freshness.config.js'

concurrency:
  group: doc-freshness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-freshness:
    name: Check Documentation Freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm ci

      - name: Cache URL Validation Results
        uses: actions/cache@v6
        with:
          path: .doc-freshness-cache
          key: doc-freshness-urls-${{ github.run_id }}
          restore-keys: |
            doc-freshness-urls-

      - name: Run Documentation Freshness Check
        id: check
        run: |
          EXTRA_ARGS=""
          if [ "${{ inputs.skip_url_check }}" == "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --skip-urls"
          fi
          if [ "${{ inputs.verbose }}" == "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --verbose"
          fi

          npx doc-freshness \
            --reporter markdown \
            --output .doc-freshness-reports/report.md \
            $EXTRA_ARGS || echo "has_issues=true" >> $GITHUB_OUTPUT

          npx doc-freshness \
            --reporter json \
            --output .doc-freshness-reports/report.json \
            $EXTRA_ARGS || true

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: doc-freshness-report
          path: .doc-freshness-reports/

      - name: Add PR Comment
        if: github.event_name == 'pull_request' && steps.check.outputs.has_issues == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('.doc-freshness-reports/report.md', 'utf8');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('Documentation Freshness Report')
            );

            const body = `## 📚 Documentation Freshness Report\n\n${report}\n\n---\n*Generated by doc-freshness workflow*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Create/Update Tracking Issue (Scheduled Run)
        if: github.event_name == 'schedule' && steps.check.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('.doc-freshness-reports/report.md', 'utf8');
            const json = JSON.parse(fs.readFileSync('.doc-freshness-reports/report.json', 'utf8'));

            const title = `📚 Documentation Freshness Issues - ${new Date().toISOString().split('T')[0]}`;
            const labels = ['documentation', 'automated'];

            // Search for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels.join(','),
              state: 'open',
            });

            const existingIssue = issues.find(i => i.title.includes('Documentation Freshness Issues'));

            const body = `# Documentation Freshness Report

**Run Date:** ${new Date().toISOString()}
**Errors:** ${json.summary.errors}
**Warnings:** ${json.summary.warnings}

${report}

---
*This issue is automatically updated by the doc-freshness workflow. Close this issue once all problems are resolved.*`;

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body,
              });
              console.log(`Updated issue #${existingIssue.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
              console.log(`Created issue #${newIssue.number}`);
            }

      - name: Write Job Summary
        if: always()
        run: |
          if [ -f .doc-freshness-reports/report.md ]; then
            cat .doc-freshness-reports/report.md >> $GITHUB_STEP_SUMMARY
          fi
